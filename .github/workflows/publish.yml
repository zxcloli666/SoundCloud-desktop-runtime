name: Publish

# Triggered by pushing a `v*` tag. Publishes:
#  - js/ to GitHub Packages npm (@zxcloli666/desktop-runtime-js)
#  - skia-desktop, js-host, rn-linux, rn-windows to this repo's own
#    self-hosted sparse Cargo registry, served from this repo's GitHub
#    Pages.
# `rusty_hermes` (the Hermes binding js-host depends on) is published
# separately, from ITS OWN repo (zxcloli666/rusty_hermes) — never this
# one, so this repo's releases only ever carry its own artifacts. See
# docs/registry.md for the full mechanics and why crates.io/npm proper
# aren't used.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write
  packages: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com

      - working-directory: js
        run: pnpm install --no-frozen-lockfile && pnpm build

      # npm versions are immutable — a re-run of this workflow (e.g. to
      # pick up a fix in the crates side) would otherwise fail here on a
      # version that already published successfully. Same idempotency
      # philosophy as publish-crates' own "already indexed — skipping" /
      # "release already exists — skipping" checks below.
      - name: Publish (skip if this version is already live)
        working-directory: js
        run: |
          name=$(node -p "require('./package.json').name")
          version=$(node -p "require('./package.json').version")
          if npm view "$name@$version" version --registry https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "$name@$version is already published — skipping"
          else
            pnpm publish --no-git-checks --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Prepare registry working dirs
        run: |
          mkdir -p registry-index crate-output
          cp ops/cargo-registry/config.json registry-index/config.json

      # Without this, every run starts registry-index/ empty, so
      # publish-crate.mjs's own "already indexed — skipping" check never
      # fires and every crate gets re-packaged even when its version
      # didn't change — see seed-live-index.mjs's own comment for why
      # that silently corrupts unchanged crates' checksums.
      - name: Seed registry-index from the live site
        run: |
          node ops/cargo-registry/seed-live-index.mjs https://zxcloli666.github.io/SoundCloud-desktop-runtime/registry registry-index skia-desktop js-host rn-linux rn-windows

      - name: Start ephemeral local registry server
        # skia-desktop/js-host/rn-linux/rn-windows depend on each other —
        # the one published earlier in this same run needs to already resolve via
        # HTTP before the next can be packaged, and waiting on real GitHub
        # Pages deploy propagation mid-job would be slow and flaky, so
        # every packaging step here resolves against this ephemeral
        # server instead. The real, public deploy happens once, at the
        # end, from the final state of `registry-index/`. `rusty_hermes`
        # itself resolves from its own, already-live registry
        # (zxcloli666/rusty_hermes's own Pages) — nothing to bootstrap
        # for it here.
        run: |
          node ops/cargo-registry/serve-local.mjs registry-index 8931 > /tmp/registry-server.log 2>&1 &
          for _ in $(seq 1 20); do grep -q READY /tmp/registry-server.log && break; sleep 0.5; done
          grep -q READY /tmp/registry-server.log

      - name: Publish this repo's own crates
        env:
          CARGO_REGISTRIES_DESKTOP_RUNTIME_INDEX: sparse+http://127.0.0.1:8931/
        run: |
          node ops/cargo-registry/publish-crate.mjs crates/skia-desktop registry-index crate-output
          node ops/cargo-registry/publish-crate.mjs crates/js-host registry-index crate-output
          node ops/cargo-registry/publish-crate.mjs crates/rn-linux registry-index crate-output
          node ops/cargo-registry/publish-crate.mjs crates/rn-windows registry-index crate-output

      # Every index entry above still points at the ephemeral local server
      # for any desktop-runtime dependency — see
      # fixup-ephemeral-urls.mjs's own comment for why this has to be one
      # pass over the whole directory, after packaging, not a per-crate
      # translation during it.
      - name: Fix up ephemeral registry URLs before deploying
        run: |
          node ops/cargo-registry/fixup-ephemeral-urls.mjs sparse+http://127.0.0.1:8931/ sparse+https://zxcloli666.github.io/SoundCloud-desktop-runtime/registry/ registry-index

      - name: Upload .crate tarballs as release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for crate_file in crate-output/*.crate; do
            name_version=$(basename "$crate_file" .crate)
            tag="${name_version%-*}-v${name_version##*-}"
            if gh release view "$tag" >/dev/null 2>&1; then
              echo "release $tag already exists, skipping"
              continue
            fi
            gh release create "$tag" "$crate_file" \
              --title "$name_version (registry artifact)" \
              --notes "Registry artifact for this repo's self-hosted Cargo registry — see docs/registry.md."
          done

      - name: Deploy the registry index to GitHub Pages
        run: mkdir -p _site/registry && cp -r registry-index/. _site/registry/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - uses: actions/deploy-pages@v4

  release-notes:
    needs: [publish-npm, publish-crates]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build release notes with RN/Skia/Reanimated coverage
        working-directory: compat
        run: |
          {
            echo "## Compatibility"
            echo
            node generate-table.mjs
          } > /tmp/release-notes.md

      - name: Update the tag's GitHub Release with the compatibility section
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          if [ "$tag" = "$GITHUB_REF" ]; then
            echo "not a tag push (manual dispatch) — skipping release-notes update"
            exit 0
          fi
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --notes-file /tmp/release-notes.md
          else
            gh release create "$tag" --title "$tag" --notes-file /tmp/release-notes.md
          fi
